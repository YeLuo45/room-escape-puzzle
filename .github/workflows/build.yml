name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact_name: linux_x86_64
            godot_binary: Godot_v4.2.2-stable_linux.x86_64
            godot_archive: Godot_v4.2.2-stable_linux.x86_64.zip
            preset_name: Linux
          - os: windows-2022
            artifact_name: windows_x86_64.exe
            godot_binary: Godot_v4.2.2-stable_win64.exe
            godot_archive: Godot_v4.2.2-stable_win64.exe.zip
            preset_name: Windows
          - os: macos-14
            artifact_name: macos_arm64.zip
            godot_binary: Godot.app
            godot_archive: Godot_v4.2.2-stable_macos.universal.zip
            preset_name: macOS

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Godot
        run: |
          curl -sL https://github.com/godotengine/godot/releases/download/4.2.2-stable/${{ matrix.godot_archive }} -o ${{ matrix.godot_archive }}
          unzip -o -q ${{ matrix.godot_archive }}

      - name: Build Export
        run: |
          mkdir -p bin
          ./${{ matrix.godot_binary }} --headless --export-release "${{ matrix.preset_name }}" bin/${{ matrix.artifact_name }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: bin/${{ matrix.artifact_name }}

  build-web:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Godot
        run: |
          curl -sL https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_linux.x86_64.zip -o Godot_v4.2.2-stable_linux.x86_64.zip
          unzip -o -q Godot_v4.2.2-stable_linux.x86_64.zip
          chmod +x Godot_v4.2.2-stable_linux.x86_64

      - name: Download Export Templates
        run: |
          curl -sL https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_export_templates.tpz -o Godot_v4.2.2-stable_export_templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/4.2.2.stable/
          unzip -o -q Godot_v4.2.2-stable_export_templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* ~/.local/share/godot/export_templates/4.2.2.stable/

      - name: Build Web Export
        run: |
          mkdir -p bin/web
          ./Godot_v4.2.2-stable_linux.x86_64 --headless --export-release "Web" bin/web/index.html

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web_build
          path: bin/web/

  deploy-netlify:
    needs: build-web
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Web Build
        uses: actions/download-artifact@v4
        with:
          name: web_build
          path: dist/

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: ./dist
          production-deploy: true
          deploy-message: "Deploy from GitHub Actions"
          enable-pull-request-comment: false
          enable-commit-comment: false
          overwrites-pull-request-comment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 5

      - name: Set COOP/COEP headers
        run: |
          # Configure headers via Netlify API after deployment
          DEPLOY_ID=$(curl -s "https://api.netlify.com/api/v1/sites/${{ secrets.NETLIFY_SITE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.NETLIFY_AUTH_TOKEN }}" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['id'])")
          echo "Deploy ID: $DEPLOY_ID"
      shell: bash

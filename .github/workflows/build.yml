name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact_name: linux_x86_64
            godot_platform: linux.x86_64
            godot_archive: Godot_v4.2.2-stable_linux.x86_64.zip
          - os: windows-2022
            artifact_name: windows_x86_64
            godot_platform: win64.exe
            godot_archive: Godot_v4.2.2-stable_win64.exe.zip
          - os: macos-14
            artifact_name: macos_arm64
            godot_platform: macos.universal.zip
            godot_archive: Godot_v4.2.2-stable_macos.universal.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Godot
        run: |
          curl -sL https://github.com/godotengine/godot/releases/download/4.2.2-stable/${{ matrix.godot_archive }} -o ${{ matrix.godot_archive }}
          unzip -o -q ${{ matrix.godot_archive }}
          chmod +x Godot_v4.2.2-stable_${{ matrix.godot_platform }}

      - name: Build Export
        run: |
          mkdir -p bin
          ./Godot_v4.2.2-stable_${{ matrix.godot_platform }} --headless --export-release "${{ matrix.godot_platform }}" bin/${{ matrix.artifact_name }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: bin/${{ matrix.artifact_name }}

  build-web:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Godot
        run: |
          curl -sL https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_linux.x86_64.zip -o Godot_v4.2.2-stable_linux.x86_64.zip
          unzip -o -q Godot_v4.2.2-stable_linux.x86_64.zip
          chmod +x Godot_v4.2.2-stable_linux.x86_64

      - name: Download Export Templates
        run: |
          curl -sL https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_export_templates.tpz -o Godot_v4.2.2-stable_export_templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/4.2.2.stable/
          unzip -o -q Godot_v4.2.2-stable_export_templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* ~/.local/share/godot/export_templates/4.2.2.stable/

      - name: Build Web Export
        run: |
          mkdir -p bin/web
          ./Godot_v4.2.2-stable_linux.x86_64 --headless --export-release "Web" bin/web/index.html

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web_build
          path: bin/web/

  deploy-gh-pages:
    needs: build-web
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Web Build
        uses: actions/download-artifact@v4
        with:
          name: web_build
          path: dist/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact_name: linux_x86_64
            godot_binary: Godot_v3.6.2-stable_linux_headless.64
            godot_archive: Godot_v3.6.2-stable_linux_headless.64.zip
            preset_name: Linux
          - os: windows-2022
            artifact_name: windows_x86_64.exe
            godot_binary: Godot_v3.6.2-stable_win64.exe
            godot_archive: Godot_v3.6.2-stable_win64.exe.zip
            preset_name: Windows
          - os: macos-14
            artifact_name: macos_arm64.zip
            godot_binary: Godot.app
            godot_archive: Godot_v3.6.2-stable_osx.universal.zip
            preset_name: macOS

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Godot
        run: |
          curl -sL https://github.com/godotengine/godot/releases/download/3.6.2-stable/${{ matrix.godot_archive }} -o ${{ matrix.godot_archive }}
          unzip -o -q ${{ matrix.godot_archive }}

      - name: Build Export
        run: |
          mkdir -p bin
          ./${{ matrix.godot_binary }} --headless --export-release "${{ matrix.preset_name }}" bin/${{ matrix.artifact_name }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: bin/${{ matrix.artifact_name }}

  build-web:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Godot
        run: |
          curl -sL https://github.com/godotengine/godot/releases/download/3.6.2-stable/Godot_v3.6.2-stable_linux_headless.64.zip -o Godot_v3.6.2-stable_linux_headless.64.zip
          unzip -o -q Godot_v3.6.2-stable_linux_headless.64.zip
          chmod +x Godot_v3.6.2-stable_linux_headless.64

      - name: Download Export Templates
        run: |
          curl -sL https://github.com/godotengine/godot/releases/download/3.6.2-stable/Godot_v3.6.2-stable_export_templates.tpz -o Godot_v3.6.2-stable_export_templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/3.6.2.stable/
          unzip -o -q Godot_v3.6.2-stable_export_templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* ~/.local/share/godot/export_templates/3.6.2.stable/

      - name: Build Web Export
        run: |
          mkdir -p bin/web
          ./Godot_v3.6.2-stable_linux_headless.64 --headless --export-release "Web" bin/web/index.html

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web_build
          path: bin/web/

  deploy-netlify:
    needs: build-web
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Web Build
        uses: actions/download-artifact@v4
        with:
          name: web_build
          path: dist/

      - name: Copy netlify.toml for headers
        run: cp netlify.toml dist/

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: ./dist
          production-deploy: true
          deploy-message: "Deploy from GitHub Actions (Godot 3.6.2)"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 5

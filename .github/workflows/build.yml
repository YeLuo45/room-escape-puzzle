name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact_name: linux_x86_64
            godot_platform: linux.x86_64
          - os: windows-2022
            artifact_name: windows_x86_64
            godot_platform: win64.exe
          - os: macos-14
            artifact_name: macos_arm64
            godot_platform: macos.universal.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: heroici/godot-action@v0.2
        with:
          version: 4.2.2
          platform: ${{ matrix.godot_platform }}

      - name: Build Export
        run: |
          godot --headless --export-release "${{ matrix.godot_platform }}" bin/${{ matrix.artifact_name }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: bin/${{ matrix.artifact_name }}

  build-web:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: heroici/godot-action@v0.2
        with:
          version: 4.2.2
          platform: web

      - name: Build Web Export
        run: |
          mkdir -p bin/web
          godot --headless --export-release "Web" bin/web/index.html

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web_build
          path: bin/web/

  deploy-gh-pages:
    needs: build-web
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Web Build
        uses: actions/download-artifact@v4
        with:
          name: web_build
          path: dist/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
